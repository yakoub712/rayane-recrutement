<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Offres d'emploi | RAYANE TAPIS</title>
               <link rel="icon" type="image/png" href="04a2f3eb-8599-47e1-9579-78458bc10f6a.png">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --brand-orange: #ff7a00;
            --bg-dark: #0f172a;
            --card-bg: #1e293b;
        }

        body { font-family: 'Poppins', sans-serif; background: var(--bg-dark); color: white; padding: 40px; margin: 0; }
       h1{
        color:#e06c00;
       }
        /* الهيدر المدمج به الشعار والعنوان */
        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 1200px;
            margin: 0 auto 40px auto;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding-bottom: 20px;
        }
        .page-header h1 { margin: 0; font-size: 28px; color: #f8fafc; }
        .logo-container img { height: 55px; width: auto; object-fit: contain; }

        /* شبكة العروض */
        .offers-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 30px; max-width: 1200px; margin: 0 auto; }
        .offer-card { background: var(--card-bg); border-radius: 15px; overflow: hidden; box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1); transition: transform 0.3s ease; display: flex; flex-direction: column; }
        .offer-card:hover { transform: translateY(-5px); }
        .offer-image { width: 100%; height: 200px; object-fit: cover; cursor: pointer; }
        .offer-details { padding: 20px; flex-grow: 1; display: flex; flex-direction: column; justify-content: space-between; }
        .offer-title { font-size: 20px; font-weight: 600; margin: 0 0 10px 0; color: #f8fafc; }
        .offer-description { font-size: 14px; color: #94a3b8; line-height: 1.6; margin-bottom: 20px; }
       
        /* زر التقديم بلون الشعار */
        .btn-apply {
            background: var(--brand-orange);
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            transition: background 0.2s, transform 0.1s;
            text-align: center;
        }
        .btn-apply:hover { background: #e06c00; }
        .btn-apply:active { transform: scale(0.98); }

        /* ستايل النوافذ المنبثقة المشترك */
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.85); justify-content: center; align-items: center; backdrop-filter: blur(5px); }
        .close-modal { position: absolute; top: 20px; right: 30px; color: #f1f1f1; font-size: 35px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .close-modal:hover { color: var(--brand-orange); }

        /* نافذة تكبير الصورة */
        .modal-content { max-width: 80%; max-height: 80%; border-radius: 10px; box-shadow: 0 4px 20px rgba(255,255,255,0.1); }
        
        /* نافذة استمارة التقديم */
        .form-container { background: #1e293b; padding: 30px; border-radius: 15px; width: 100%; max-width: 450px; box-shadow: 0 10px 25px rgba(0,0,0,0.3); position: relative; border-top: 4px solid var(--brand-orange); }
        .form-container h2 { margin-top: 0; font-size: 22px; color: #fff; margin-bottom: 20px; }
        .form-group { margin-bottom: 18px; }
        .form-group label { display: block; margin-bottom: 8px; font-size: 14px; color: #cbd5e1; }
        .form-group input[type="text"], .form-group input[type="email"], .form-group input[type="file"] { width: 100%; padding: 10px 12px; border-radius: 6px; border: 1px solid #475569; background: #0f172a; color: white; font-family: inherit; box-sizing: border-box; }
        .form-group input:focus { outline: none; border-color: var(--brand-orange); }
        .form-group input[type="file"] { padding: 8px; font-size: 13px; }
      
    </style>
</head>
<body>

    <!-- الهيدر المحدث -->
    <header class="page-header">
        <h1  style="color: #e06c00;">Offres d'emploi Disponibles</h1>
        <div class="logo-container">
            <img src="../04a2f3eb-8599-47e1-9579-78458bc10f6a.png" alt="Logo RAYANE TAPIS">
        </div>
    </header>

    <!-- شبكة عروض العمل -->
    <div class="offers-grid" id="offersContainer"></div>

    <!-- 1. نافذة تكبير الصورة (Modal) -->
    <div id="imageModal" class="modal">
        <span class="close-modal" id="closeImgModal">&times;</span>
        <img class="modal-content" id="imgFull">
    </div>

    <!-- 2. نافذة نموذج التقديم (Application Modal) -->
    <div id="applyModal" class="modal">
        <div class="form-container">
            <span class="close-modal" id="closeApplyModal" style="top: 15px; right: 20px;">&times;</span>
            <h2 id="applyJobTitle">Postuler pour l'offre</h2>
            
            <form id="applicationForm" onsubmit="submitApplication(event)">
                <!-- حقل مخفي لتخزين معرف الوظيفة أو عنوانها -->
                <input type="hidden" id="jobIdentifier">
                
                <div class="form-group">
                    <label for="applicantName">Nom complet *</label>
                    <input type="text" id="applicantName" required placeholder="Votre nom complet">
                </div>
                <div class="form-group">
                    <label for="applicantEmail">Adresse Email *</label>
                    <input type="email" id="applicantEmail" required placeholder="exemple@mail.com">
                </div>
                <div class="form-group">
                    <label for="applicantCV">Votre CV (Format Image) *</label>
                    <input type="file" id="applicantCV" accept="image/*" required>
                </div>
                <button type="submit" class="btn-apply" style="margin-top: 10px;">Envoyer la candidature</button>
            </form>
        </div>
    </div>

    <script>const imageModal = document.getElementById('imageModal');
const imgFull = document.getElementById('imgFull');
const applyModal = document.getElementById('applyModal');
const applyJobTitle = document.getElementById('applyJobTitle');
const jobIdentifier = document.getElementById('jobIdentifier');

// جلب وعرض الوظائف من السيرفر
async function fetchAndDisplayOffers() {
    const container = document.getElementById('offersContainer');
    try {
        const response = await fetch('http://localhost:3000/api/offers');
        const offers = await response.json();
        
        if (!offers || offers.length === 0) {
            container.innerHTML = `<p style="text-align:center; grid-column: 1/-1;">Aucune offre disponible.</p>`;
            return;
        }

        container.innerHTML = offers.map(offer => `
            <div class="offer-card">
                <img class="offer-image" src="${offer.imageUrl}" alt="${offer.title}" onclick="openImage('${offer.imageUrl}')">
                <div class="offer-details">
                    <div>
                        <h2 class="offer-title">${offer.title}</h2>
                        <p class="offer-description">${offer.description}</p>
                    </div>
                    <button class="btn-apply" onclick="openApplyForm('${offer.title}')">Postuler</button>
                </div>
            </div>
        `).join('');

    } catch (error) {
        console.error("Erreur lors de la récupération des offres:", error);
    }
}

// فتح وتكبير الصورة
function openImage(url) {
    imageModal.style.display = "flex";
    imgFull.src = url;
}

// فتح نموذج التتقديم وتخصيصه باسم الوظيفة المحددة
function openApplyForm(title) {
    applyModal.style.display = "flex";
    applyJobTitle.textContent = `Postuler: ${title}`;
    jobIdentifier.value = title; // حفظ اسم الوظيفة في الحقل المخفي
}

// إغلاق النوافذ عند الضغط على X
document.getElementById('closeImgModal').addEventListener('click', () => { imageModal.style.display = "none"; });
document.getElementById('closeApplyModal').addEventListener('click', () => { applyModal.style.display = "none"; });

// إغلاق النوافذ عند الضغط خارجها
window.addEventListener('click', (e) => {
    if (e.target === imageModal) imageModal.style.display = "none";
    if (e.target === applyModal) applyModal.style.display = "none";
});

// معالجة وإرسال بيانات استمارة التقديم سحابياً
async function submitApplication(event) {
    event.preventDefault();
    
    const name = document.getElementById('applicantName').value;
    const email = document.getElementById('applicantEmail').value;
    const cvFile = document.getElementById('applicantCV').files[0];
    const job = jobIdentifier.value;

    if (!cvFile) {
        alert("Veuillez sélectionner votre CV (Image ou PDF).");
        return;
    }

    const formData = new FormData();
    formData.append('name', name);
    formData.append('email', email);
    formData.append('jobTitle', job);
    formData.append('cvImage', cvFile); // يطابق حقل استقبال الملف السحابي تماماً لقاعدة البيانات

    try {
        const response = await fetch('http://localhost:3000/api/candidatures', {
            method: 'POST',
            body: formData 
        });

        const result = await response.json();

        if (response.ok) {
            alert("Votre candidature a été envoyée avec succès !");
            document.getElementById('applicationForm').reset();
            applyModal.style.display = "none";
        } else {
            alert("Erreur: " + (result.error || "Impossible d'envoyer la candidature."));
        }
    } catch (error) {
        console.error("Erreur:", error);
        alert("Impossible de contacter le serveur.");
    }
}
 
// تشغيل جلب العروض وربط حدث الإرسال فور تحميل الصفحة
document.addEventListener('DOMContentLoaded', () => {
    fetchAndDisplayOffers();

    // 👈 هذا السطر الجديد والمهم جداً لربط الاستمارة بالدالة ومنع تحديث الصفحة العشوائي
    const appForm = document.getElementById('applicationForm');
    if (appForm) {
        appForm.addEventListener('submit', submitApplication);
    }
});
    </script>
</body>
</html>
